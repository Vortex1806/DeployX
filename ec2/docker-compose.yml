version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: deployx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: deployx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # api-server and reverse-proxy get uncommented here once their
  # images exist (Day 1, hr 2-6 and Day 2, hr 0-2).
  #
  # api-server:
  #   image: <your-ecr-or-dockerhub>/deployx-api-server:latest
  #   restart: unless-stopped
  #   env_file: .env
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - postgres
  #     - redis
  #
  # reverse-proxy:
  #   image: <your-ecr-or-dockerhub>/deployx-reverse-proxy:latest
  #   restart: unless-stopped
  #   env_file: .env
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - api-server

volumes:
  postgres_data:
